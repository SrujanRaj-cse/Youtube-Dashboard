<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Channel content</title>
  <link rel="stylesheet" href="../css files/channelPosts.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" 
  integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg==" 
  crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" 
  rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans:ital,wght@0,100..900;1,100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" 
rel="stylesheet">
<link href="https://fonts.cdnfonts.com/css/youtube-sans" rel="stylesheet">
</head>
<body>
  <div class="container">
    <div class="first-container">
      <p class="title">Channel content</p>
    </div>
    <div class="options">
      <a href="../html files/ChannelInspiration.html">
        <div class="inspire">
          <p class="inspiration">Inspiration</p>
        </div>
      </a>
      <a href="../html files/channelContent.html">
        <div class="vid">
          <p class="videos">Videos</p>
        </div>
      </a>
      <a href="../html files/channelShorts.html">
        <div class="short">
          <p class="shorts">Shorts</p>
        </div>
      </a>
      <a href="../html files/channelLive.html">
        <div class="live_">
          <p class="live">Live</p>
        </div>
      </a>
      <div class="post">
        <p class="posts">Posts</p>
      </div>
      <div class="play">
        <p class="playlists">Playlists</p>
      </div>
      <a href="../html files/channelPodcast.html">
        <div class="pod">
          <p class="podcasts">Podcasts</p>
        </div>
      </a>
      <a href="../html files/channelPromo.html">
        <div class="pro">
          <p class="promotion">Promotions</p>
        </div>
      </a>
    </div>

    <div class="filters-block">
      <img src="../images-content/filter-svgrepo-com.svg" alt="" class="filters_svg">
      <p class="filter">Filter</p>
    </div>

    <hr>

    <div class="additional_">
      <div class="left">
        <p class="video" title="This shows all the videos uploaded to your channel.

Select any video to change its title or description.">Post</p>
      </div>

      <div class="middle">
        <div class="zeroth-opt">
          <p class="zero">Type</p>
        </div>
        <div class="first_opt">
          <p class="first">
            Visibility
          </p>
        </div>
        <div class="second_opt">
          <p class="second">
            Restrictions
          </p>
        </div>
         <div class="third_opt">
          <p class="third" title="The date you uploaded, scheduled, or published your video

You’ll see the upload date if your video is private, or unlisted. If 
your video is scheduled (to go public or as a premiere) you’ll 
see the scheduled date. If your video is public you will see the
published date. If your video is uploaded via RSS you'll see the 
original release date from the RSS.">
            Date
          </p>
          <img src="../images-content/down-arrow-svgrepo-com.svg  " alt="" class="down_arrow">
        </div>
      </div>

      <div class="right">
        <div class="rmr">
          <p class="comments" title="How many comments your post has

Take a look at the post type and content of your most-
commented posts. You can learn what your audience is most
likely to comment on.">Comments</p>
        </div>
        <div class="rrl">
          <p class="likes" title="How many likes (vs dislikes) your video has

Take a look at the topic and format of your most-liked videos.
You can learn what’s most appealing to your audience.">Likes(vs dislikes)</p>
        </div>
        <div class="rrr">
          <p class="response" title="How many responses your poll or quiz has

Take a look at your most-voted polls and most-answered
quizzes. You can learn which questions your audience is most
likely to respond to.">Responses </p>
        </div>
      </div>

    </div>

    <div class="lower-part">
      <img src="../images-content/channelposts.svg" alt="" class="no-content">
      <p class="avail">Use a post to update your viewers with polls, images, and more</p>
        <button class="upload">Create a post</button>
    </div>
  </div>
</body>
</html>
