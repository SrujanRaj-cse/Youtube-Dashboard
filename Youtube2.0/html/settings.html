<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings</title>
  <link rel="stylesheet" href="../css/settings.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" 
  integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg==" 
  crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" 
  rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans:ital,wght@0,100..900;1,100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" 
rel="stylesheet">
<link href="https://fonts.cdnfonts.com/css/youtube-sans" rel="stylesheet">
</head>
<body>
    <div class="con">
      <div class="con1">
        <p class="title">Settings</p>
      </div>
      <div class="con2">
        <div class="options">
           <div class="f1">
            <p class="a1">General</p>
           </div>
           <div class="f2">
            <p class="a2">Channel</p>
           </div>
           <div class="f3">
            <p class="a3">Upload defaults</p>
           </div>
           <div class="f4">
            <p class="a4">Permissions</p>
           </div>
           <div class="f5">
            <p class="a5">Communication moderation</p>
           </div>
           <div class="f6">
            <p class="a6">Creator demograprahies</p>
           </div>
           <div class="f7">
            <p class="a7">Agreements</p>
           </div>
        </div>
        <div class="con2right">
          <div class="con2rtitle">
            <p class="rtitle">Default units</p>
            <img src="../images/question-mark-circled-svgrepo-com.svg" alt="question mark circled svgrepo com" class="question">
          </div>
            <div class="money">
              <p class="main">Currency</p>
              <div class="downarrow">
                <p class="des">USD - US Dollar</p>
                <img src="../images-earn/down-arrow-backup-2-svgrepo-com.svg" alt="down arrow backup 2 svgrepo com" class="down">  
              </div>
            </div>
        </div>
      </div>
      <div class="con3">
        <a href="../html/dashboard.html">
          <button class="close">Close</button>
        </a>
        <button class="save">Save</button>
      </div>
    </div>
</body>
</html>
