<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Channel Podcast</title>
  <link rel="stylesheet" href="../css/channelPodcast.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" 
  integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg==" 
  crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" 
  rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans:ital,wght@0,100..900;1,100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" 
rel="stylesheet">
<link href="https://fonts.cdnfonts.com/css/youtube-sans" rel="stylesheet">
</head>
<body>
  <div class="container">
    <div class="first-container">
      <p class="title">Channel content</p>
    </div>
    <div class="options">
      <a href="../html/channelInspiration.html">
        <div class="inspire">
          <p class="inspiration">Inspiration</p>
        </div>
      </a>
      <a href="../html/channelContent.html">
        <div class="vid">
          <p class="videos">Videos</p>
        </div>
      </a>
      <a href="../html/channelShorts.html">
        <div class="short">
          <p class="shorts">Shorts</p>
        </div>
      </a>
      <a href="../html/channelLive.html">
        <div class="live_">
          <p class="live">Live</p>
        </div>
      </a>
      <a href="../html/channelPosts.html">
        <div class="post">
          <p class="posts">Posts</p>
        </div>
      </a>
      <div class="play">
        <p class="playlists">Playlists</p>
      </div>
      <div class="pod">
        <p class="podcasts">Podcasts</p>
      </div>
      <a href="../html/channelPromo.html">
        <div class="pro">
          <p class="promotion">Promotions</p>
        </div>
      </a>
    </div>
    <div class="additional_">
      <div class="left">
        <p class="video" title="This shows all your podcast shows.">Podcast</p>
      </div>

      <div class="middle">
        <div class="first_opt">
          <p class="first" title="Who can see this playlist.">
            Visibility
          </p>
        </div>
        <div class="second_opt">
          <p class="second" title="The last time this playlist was updated.">
            Last updated
          </p>
        </div>
         <div class="third_opt">
          <p class="third" title="The number of videos that are in the playlist.">
            Video count
          </p>
        </div>
      </div>
    </div>

    <hr>

    <div class="lower-part">
      <img src="../images-content/channel.svg" alt="channel" class="no-content">
      <p class="avail">Create a new podcast, set an existing playlist as a podcast, or submit 
        <span class="line-first">your RSS feed.
         <span class="line-color">Learn more</span></span></p>
        <button class="upload">New Podcast</button> 
    </div>
  </div>
</body>
</html>
