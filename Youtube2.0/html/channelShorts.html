<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Channel content</title>
  <link rel="stylesheet" href="../css/channelShorts.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" 
  integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg==" 
  crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" 
  rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans:ital,wght@0,100..900;1,100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" 
rel="stylesheet">
<link href="https://fonts.cdnfonts.com/css/youtube-sans" rel="stylesheet">
</head>
<body>
  <div class="container">
    <div class="first-container">
      <p class="title">Channel content</p>
    </div>
    <div class="options">
      <a href="../html/channelInspiration.html">
        <div class="inspire">
          <p class="inspiration">Inspiration</p>
        </div>
      </a>
      <a href="../html/channelContent.html">
        <div class="vid">
          <p class="videos">Videos</p>
        </div>
      </a>
      <div class="short">
        <p class="shorts">Shorts</p>
      </div>
      <a href="../html/channelLive.html">
        <div class="live_">
          <p class="live">Live</p>
        </div>
      </a>
      <a href="../html/channelPosts.html">
        <div class="post">
          <p class="posts">Posts</p>
        </div>
      </a>
      <div class="play">
        <p class="playlists">Playlists</p>
      </div>
      <a href="../html/channelPodcast.html">
        <div class="pod">
          <p class="podcasts">Podcasts</p>
        </div>
      </a>
      <a href="../html/channelPromo.html">
        <div class="pro">
          <p class="promotion">Promotions</p>
        </div>
      </a>
    </div>

    <div class="filters-block">
      <img src="../images-content/filter-svgrepo-com.svg" alt="filter svgrepo com" class="filters_svg">
      <p class="filter">Filter</p>
    </div>

    <hr>

    <div class="additional_">
      <div class="left">
        <input type="checkbox" class="tick" title="Select all">
        <p class="video" title="This shows all the shorts uploaded to your channel">Short</p>
      </div>

      <div class="middle">
        <div class="first_opt">
          <p class="first">
            Visibility
          </p>
        </div>
        <div class="second_opt">
          <p class="second">
            Restrictions
          </p>
        </div>
         <div class="third_opt">
          <p class="third" title="The date you uploaded, scheduled, or published your video

You’ll see the upload date if your video is private, or unlisted. If 
your video is scheduled (to go public or as a premiere) you’ll 
see the scheduled date. If your video is public you will see the
published date. If your video is uploaded via RSS you'll see the 
original release date from the RSS.">
            Date
          </p>
          <img src="../images-content/down-arrow-svgrepo-com.svg" alt="down arrow svgrepo com" class="down_arrow">
        </div>
      </div>

      <div class="right">
        <div class="rrl">
          <p class="view">Views</p>
        </div>
        <div class="rmr">
          <p class="comments">Comments</p>
        </div>
        <div class="rrr">
          <p class="likes" title="How many likes (vs dislikes) your video has

Take a look at the topic and format of your most-liked videos.
You can learn what’s most appealing to your audience.">Likes(vs dislikes)</p>
        </div>
      </div>

    </div>

    <div class="lower-part">
      <img src="../images-content/channel.svg" alt="channel" class="no-content">
      <p class="avail">No content available</p>
      <a href="../html/upload-videos.html">
        <button class="upload">Upload videos</button>
      </a>
    </div>

  </div>
</body>
</html>
